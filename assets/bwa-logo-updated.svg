<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-label="Barrie Workflow Automation">
  <title>Barrie Workflow Automation</title>
  <rect width="1080" height="1080" fill="#1A1A1A"/>

  <!-- BWA monogram -->
  <text x="540" y="560"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="420"
        text-anchor="middle"
        letter-spacing="-10">
    <tspan fill="#B8860B">B</tspan><tspan fill="#FFFFFF">W</tspan><tspan fill="#B8860B">A</tspan>
  </text>

  <!-- Gold rule line -->
  <rect x="180" y="590" width="720" height="4" fill="#B8860B"/>

  <!-- Subtitle -->
  <text x="540" y="660"
        font-family="Arial, sans-serif"
        font-weight="400"
        font-size="38"
        fill="#C0C0C0"
        text-anchor="middle"
        letter-spacing="5">BARRIE WORKFLOW AUTOMATION</text>
</svg>
